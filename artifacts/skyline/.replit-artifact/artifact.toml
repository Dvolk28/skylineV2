kind = "web"
previewPath = "/"
title = "Skyline"
version = "1.0.0"
id = "artifacts/skyline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21493

[services.development]
run = "pnpm --filter @workspace/skyline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skyline", "run", "build" ]
publicDir = "artifacts/skyline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21493"
BASE_PATH = "/"
